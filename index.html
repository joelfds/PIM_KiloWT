<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIM Studio - Kilowott Hackathon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --border: #2e2e2e;
            --text: #f0f0f0;
            --text2: #999;
            --text3: #555;
            --green: #00c896;
            --green-dim: #00c89620;
            --purple: #7c6af7;
            --purple-dim: #7c6af720;
            --red: #ff5757;
            --red-dim: #ff575720;
            --amber: #f5a623;
            --amber-dim: #f5a62320;
            --blue: #4d9fff;
            --blue-dim: #4d9fff20;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 12px;
            color: var(--text2);
        }
        .nav {
            flex: 1;
            padding: 16px 0;
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .nav-link:hover {
            background: var(--bg3);
        }
        .nav-link.active {
            background: var(--green-dim);
            color: var(--green);
        }
        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            fill: currentColor;
        }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .ai-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--green-dim);
            color: var(--green);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
        }
        .saved-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .saved-indicator.show {
            opacity: 1;
        }
        .header {
            height: 56px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--green);
            color: #000;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-ghost:hover {
            background: var(--bg3);
        }
        .btn-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
        }
        .btn-danger:hover {
            background: var(--red-dim);
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            width: 100%;
            transition: all 0.15s ease;
        }
        .input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-dim);
        }
        .textarea {
            resize: vertical;
            min-height: 80px;
        }
        .select {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            width: 100%;
            transition: all 0.15s ease;
        }
        .select:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-dim);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-green {
            background: var(--green-dim);
            color: var(--green);
        }
        .badge-red {
            background: var(--red-dim);
            color: var(--red);
        }
        .badge-purple {
            background: var(--purple-dim);
            color: var(--purple);
        }
        .badge-amber {
            background: var(--amber-dim);
            color: var(--amber);
        }
        .badge-blue {
            background: var(--blue-dim);
            color: var(--blue);
        }
        .badge-gray {
            background: var(--text3);
            color: var(--text2);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            background: var(--bg3);
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .table tr:hover {
            background: var(--bg3);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg3);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-red {
            background: var(--red);
        }
        .progress-amber {
            background: var(--amber);
        }
        .progress-green {
            background: var(--green);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .status-pills {
            display: flex;
            gap: 8px;
        }
        .status-pill {
            padding: 8px 16px;
            border-radius: 999px;
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .status-pill.active {
            background: var(--green);
            color: #000;
        }
        .attributes-list {
            margin-bottom: 16px;
        }
        .attribute-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .attribute-input {
            flex: 1;
        }
        .attribute-remove {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
        }
        .ai-suggest {
            margin-top: 16px;
            padding: 16px;
            background: var(--purple-dim);
            border-radius: 8px;
            border: 1px solid var(--purple);
        }
        .ai-label {
            font-size: 12px;
            color: var(--purple);
            margin-bottom: 8px;
        }
        .ai-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .ai-chip {
            padding: 4px 8px;
            background: var(--purple);
            color: #000;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
        }
        .ai-preview {
            font-style: italic;
            color: var(--text2);
        }
        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 500;
            overflow-y: auto;
            padding: 24px;
        }
        .side-panel.open {
            transform: translateX(0);
        }
        .side-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 499;
            display: none;
        }
        .side-overlay.show {
            display: block;
        }
        .bulk-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 200;
        }
        .bulk-actions.show {
            transform: translateY(0);
        }
        .bulk-selected {
            font-weight: 500;
        }
        .bulk-buttons {
            display: flex;
            gap: 8px;
        }
        .deselect {
            color: var(--text2);
            text-decoration: underline;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-2px);
            border-color: var(--green);
        }
        .product-emoji {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
        }
        .product-category {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
        }
        .product-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 20px;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 8px;
        }
        .product-stock {
            margin-bottom: 12px;
        }
        .product-attrs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }
        .attr-chip {
            padding: 2px 6px;
            background: var(--green-dim);
            color: var(--green);
            border-radius: 999px;
            font-size: 11px;
        }
        .sync-log {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .log-time {
            color: var(--text2);
            font-size: 12px;
        }
        .log-type {
            min-width: 80px;
        }
        .log-message {
            flex: 1;
        }
        .attr-card {
            margin-bottom: 16px;
        }
        .attr-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .attr-values {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .attr-count {
            color: var(--text2);
            font-size: 12px;
        }
        .usage-bar {
            width: 100%;
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .usage-fill {
            height: 100%;
            background: var(--green);
        }
        .import-export {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .drop-zone:hover {
            border-color: var(--green);
        }
        .drop-zone.dragover {
            border-color: var(--green);
            background: var(--green-dim);
        }
        .export-preview {
            background: var(--bg3);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .toasts {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .toast {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }
        .toast-success {
            border-color: var(--green);
        }
        .toast-error {
            border-color: var(--red);
        }
        .toast-info {
            border-color: var(--blue);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .shortcuts {
            position: fixed;
            bottom: 20px;
            left: 240px;
            font-size: 12px;
            color: var(--text3);
        }
        .chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bar-label {
            min-width: 120px;
            font-size: 14px;
        }
        .bar-container {
            flex: 1;
            height: 20px;
            background: var(--bg3);
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 10px;
            background: var(--green);
            transition: width 0.5s ease;
        }
        .bar-count {
            font-size: 12px;
            color: var(--text2);
            min-width: 40px;
            text-align: right;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .metric-card {
            text-align: center;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .metric-label {
            color: var(--text2);
            font-size: 14px;
        }
        .activity-feed {
            margin-bottom: 32px;
        }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .activity-time {
            color: var(--text2);
            font-size: 12px;
        }
        .activity-text {
            flex: 1;
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .action-card {
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .action-card:hover {
            background: var(--bg3);
        }
        .action-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .action-title {
            font-weight: 500;
        }
        .stats-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .checkbox {
            margin-right: 8px;
        }
        .sort-arrow {
            margin-left: 4px;
            display: inline-block;
            transition: transform 0.15s ease;
        }
        .sort-asc .sort-arrow {
            transform: rotate(180deg);
        }
        .highlight {
            background: var(--amber-dim);
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .sidebar-header {
                padding: 16px;
                text-align: center;
            }
            .logo {
                font-size: 16px;
            }
            .subtitle {
                display: none;
            }
            .nav-link {
                justify-content: center;
                padding: 12px;
            }
            .nav-link span {
                display: none;
            }
            .sidebar-footer {
                padding: 16px;
                text-align: center;
            }
            .ai-badge span {
                display: none;
            }
            .header {
                padding: 0 16px;
            }
            .page-title {
                font-size: 16px;
            }
            .main {
                padding: 16px;
            }
            .metric-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .quick-actions {
                grid-template-columns: 1fr;
            }
            .import-export {
                grid-template-columns: 1fr;
            }
            .shortcuts {
                left: 80px;
            }
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text3);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">PIM Studio</div>
                <div class="subtitle">Kilowott Hackathon</div>
            </div>
            <nav class="nav">
                <a class="nav-link active" data-page="dashboard">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    <span>Dashboard</span>
                </a>
                <a class="nav-link" data-page="products">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 7h-4V4c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v3H0v2h2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9h2V7zM6 4h8v3H6V4z"/></svg>
                    <span>Products</span>
                </a>
                <a class="nav-link" data-page="store">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 4V2C7 1.45 7.45 1 8 1s1 .45 1 1v2h4V2c0-.55.45-1 1-1s1 .45 1 1v2h4c1.1 0 2 .9 2 2v2c0 .55-.45 1-1 1H3c-.55 0-1-.45-1-1V6c0-1.1.9-2 2-2h4zM3 8h18v10c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V8z"/></svg>
                    <span>Dummy Store</span>
                </a>
                <a class="nav-link" data-page="sync">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 14.87 20 13.48 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 9.13 4 10.52 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                    <span>Sync Log</span>
                </a>
                <a class="nav-link" data-page="attributes">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z"/></svg>
                    <span>Attributes</span>
                </a>
                <a class="nav-link" data-page="import-export">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/><path d="M8 15.01l1.41 1.41L11 14.84V19h2v-4.16l1.59 1.59L16 15.01 12.01 11z"/></svg>
                    <span>Import / Export</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="ai-badge">
                    <span>AI Engine: Active</span>
                </div>
            </div>
            <div class="saved-indicator" id="savedIndicator"></div>
        </div>
        <div class="main">
            <header class="header">
                <div class="page-title" id="pageTitle">Dashboard</div>
                <div class="header-actions" id="headerActions"></div>
            </header>
            <div id="content"></div>
        </div>
    </div>
    <div class="side-panel" id="sidePanel">
        <div class="side-overlay" id="sideOverlay"></div>
    </div>
    <div class="bulk-actions" id="bulkActions">
        <div class="bulk-selected" id="bulkSelected"></div>
        <div class="bulk-buttons">
            <button class="btn btn-danger" id="bulkDelete">Bulk Delete</button>
            <button class="btn btn-ghost" id="bulkStatusActive">Set Active</button>
            <button class="btn btn-ghost" id="bulkStatusDraft">Set Draft</button>
            <button class="btn btn-ghost" id="bulkStatusInactive">Set Inactive</button>
            <button class="btn btn-primary" id="bulkSync">Sync Selected</button>
        </div>
        <div class="deselect" id="deselectAll">Deselect All</div>
    </div>
    <div class="toasts" id="toasts"></div>
    <div class="shortcuts">N to add, / to search</div>

    <script>
        // State
        let products = [];
        let currentPage = 'dashboard';
        let searchQuery = '';
        let categoryFilter = '';
        let statusFilter = '';
        let sortColumn = '';
        let sortDirection = 'asc';
        let selectedProducts = new Set();
        let syncLog = [];
        let nextId = 7;

        // Seed data
        const seedProducts = [
            {
                id: 1,

                price: 49.99,

                attributes: { Color: 'Black', Connectivity: 'Bluetooth 5.0', Battery: '30hr', 'Noise Cancellation': 'Yes' },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {

                sku: 'ACC-0002',
                name: 'USB-C Hub 7-in-1',
                description: 'Versatile USB-C hub with multiple ports.',
                price: 29.99,
                stock: 50,
                category: 'Accessories',
                status: 'Active',
                attributes: { Ports: '7', Color: 'Silver', HDMI: '4K@60Hz', 'Max Power': '100W' },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 3,
                sku: 'KEY-0003',
                name: 'Mechanical Keyboard TKL',
                description: 'Tenkeyless mechanical keyboard with RGB lighting.',
                price: 89.99,
                stock: 30,
                category: 'Keyboards',
                status: 'Active',
                attributes: { Switch: 'Cherry MX Red', Layout: 'TKL', Backlight: 'RGB', Wireless: 'No' },

                updatedAt: new Date().toISOString()
            },
            {
                id: 4,
                sku: 'CAM-0004',
                name: '4K Webcam Pro',
                description: 'Professional 4K webcam for streaming.',
                price: 119.99,
                stock: 0,
                category: 'Cameras',
                status: 'Inactive',
                attributes: { Resolution: '4K', FPS: '30', Autofocus: 'Yes', FOV: '90 degrees' },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 5,
                sku: 'MON-0005',
                name: '27" IPS Gaming Monitor',
                description: '27-inch IPS gaming monitor with high refresh rate.',
                price: 299.99,
                stock: 15,
                category: 'Monitors',
                status: 'Draft',
                attributes: { Size: '27"', 'Refresh Rate': '144Hz', Panel: 'IPS', Resolution: '2560x1440' },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            },
            {
                id: 6,
                sku: 'LAP-0006',
                name: 'UltraBook Pro 14',
                description: 'Lightweight ultrabook with M3 processor.',
                price: 1299.99,
                stock: 8,
                category: 'Laptops',
                status: 'Active',
                attributes: { RAM: '16GB', Storage: '512GB SSD', Processor: 'M3', 'Battery Life': '18hr' },
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            }
        ];

        // AI Suggestions map
        const aiSuggestions = {
            headphones: ['Frequency Response', 'Impedance', 'Driver Size', 'Noise Cancellation', 'Battery Life', 'Connectivity', 'Microphone', 'Foldable'],
            audio: ['Frequency Response', 'Impedance', 'Driver Size', 'Noise Cancellation', 'Battery Life', 'Connectivity', 'Microphone', 'Foldable'],
            keyboard: ['Switch Type', 'Layout', 'Backlight', 'Wireless', 'Hot-swap', 'Keycap Material', 'Polling Rate'],
            monitor: ['Resolution', 'Panel Type', 'Refresh Rate', 'Response Time', 'HDR', 'Brightness', 'Ports'],
            display: ['Resolution', 'Panel Type', 'Refresh Rate', 'Response Time', 'HDR', 'Brightness', 'Ports'],
            screen: ['Resolution', 'Panel Type', 'Refresh Rate', 'Response Time', 'HDR', 'Brightness', 'Ports'],
            webcam: ['Resolution', 'FPS', 'Field of View', 'Autofocus', 'Microphone', 'USB Type', 'Low Light'],
            camera: ['Resolution', 'FPS', 'Field of View', 'Autofocus', 'Microphone', 'USB Type', 'Low Light'],
            hub: ['Ports', 'Max Power Output', 'Cable Length', 'Thunderbolt', 'Compatible OS'],
            dock: ['Ports', 'Max Power Output', 'Cable Length', 'Thunderbolt', 'Compatible OS'],
            phone: ['RAM', 'Storage', 'Battery', 'Display Size', 'Processor', 'OS', 'Camera'],
            mobile: ['RAM', 'Storage', 'Battery', 'Display Size', 'Processor', 'OS', 'Camera'],
            laptop: ['RAM', 'Storage', 'Processor', 'Display', 'Battery Life', 'OS', 'Weight', 'GPU']
        };

        // Load from localStorage
        function loadData() {
            const stored = localStorage.getItem('pim-products');
            if (stored) {
                products = JSON.parse(stored);
                nextId = Math.max(...products.map(p => p.id)) + 1;
            } else {
                products = [...seedProducts];
                saveData();
            }
            const storedLog = localStorage.getItem('pim-sync-log');
            if (storedLog) {
                syncLog = JSON.parse(storedLog);
            }
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('pim-products', JSON.stringify(products));
            localStorage.setItem('pim-sync-log', JSON.stringify(syncLog));
            showSavedIndicator();
        }

        // Show saved indicator
        function showSavedIndicator() {
            const indicator = document.getElementById('savedIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 1000);
        }

        // Calculate completeness
        function calculateCompleteness(product) {
            let score = 0;
            if (product.name) score += 20;
            if (product.description) score += 20;
            if (product.price !== undefined && product.price !== null) score += 20;
            if (product.stock !== undefined && product.stock !== null) score += 20;
            if (Object.keys(product.attributes || {}).length >= 2) score += 20;
            return score;
        }

        // Get category emoji
        function getCategoryEmoji(category) {
            const emojis = {
                Audio: '🎧',
                Accessories: '🔌',
                Keyboards: '⌨️',
                Cameras: '📷',
                Monitors: '🖥️',
                Laptops: '💻'
            };
            return emojis[category] || '📦';
        }

        // Get stock badge
        function getStockBadge(stock) {
            if (stock === 0) return '<span class="badge badge-red">Out of Stock</span>';
            if (stock <= 10) return `<span class="badge badge-amber">${stock} left</span>`;
            return `<span class="badge badge-green">In Stock</span>`;
        }

        // Add to sync log
        function addToSyncLog(type, message) {
            const entry = {
                time: new Date().toLocaleTimeString(),
                type,
                message
            };
            syncLog.unshift(entry);
            if (syncLog.length > 100) syncLog = syncLog.slice(0, 100);
            saveData();
            if (currentPage === 'sync') renderSyncLog();
        }

        // Show toast
        function showToast(message, type = 'info') {
            const toasts = document.getElementById('toasts');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            toasts.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Generate SKU
        function generateSKU(category) {
            const prefix = category.substring(0, 3).toUpperCase();
            return `${prefix}-${String(nextId).padStart(4, '0')}`;
        }

        // AI suggest attributes
        function getAISuggestions(name) {
            const keywords = name.toLowerCase().split(' ');
            const suggestions = new Set();
            keywords.forEach(keyword => {
                if (aiSuggestions[keyword]) {
                    aiSuggestions[keyword].forEach(attr => suggestions.add(attr));
                }
            });
            return Array.from(suggestions).slice(0, 5);
        }

        // Generate AI description
        function generateAIDescription(name, attributes) {
            const desc = `${name} featuring ${Object.keys(attributes).slice(0, 2).join(' and ')}.`;
            return desc;
        }

        // Render dashboard
        function renderDashboard() {
            const activeProducts = products.filter(p => p.status === 'Active');
            const outOfStock = products.filter(p => p.stock === 0);
            const syncReady = products.filter(p => p.status === 'Active' && p.stock > 0);

            const categoryCounts = {};
            products.forEach(p => {
                categoryCounts[p.category] = (categoryCounts[p.category] || 0) + 1;
            });
            const maxCount = Math.max(...Object.values(categoryCounts));

            const recentActivity = syncLog.slice(0, 8);

            const content = `
                <div class="metric-grid">
                    <div class="metric-card card">
                        <div class="metric-value">${products.length}</div>
                        <div class="metric-label">Total Products</div>
                    </div>
                    <div class="metric-card card">
                        <div class="metric-value">${activeProducts.length}</div>
                        <div class="metric-label">Active Products</div>
                    </div>
                    <div class="metric-card card">
                        <div class="metric-value">${outOfStock.length}</div>
                        <div class="metric-label">Out of Stock</div>
                    </div>
                    <div class="metric-card card">
                        <div class="metric-value">${syncReady.length}</div>
                        <div class="metric-label">Sync Ready</div>
                    </div>
                </div>
                <div class="activity-feed card">
                    <h3>Recent Activity</h3>
                    ${recentActivity.length ? recentActivity.map(entry => `
                        <div class="activity-item">
                            <div class="activity-dot" style="background: var(--${entry.type.toLowerCase() === 'created' ? 'green' : entry.type.toLowerCase() === 'updated' ? 'blue' : entry.type.toLowerCase() === 'deleted' ? 'red' : entry.type.toLowerCase() === 'synced' ? 'purple' : entry.type.toLowerCase() === 'skipped' ? 'amber' : 'gray'})"></div>
                            <div class="activity-time">${entry.time}</div>
                            <div class="activity-text">${entry.message}</div>
                        </div>
                    `).join('') : '<div class="activity-item">No recent activity</div>'}
                </div>
                <div class="card">
                    <h3>Category Breakdown</h3>
                    <div class="chart">
                        ${Object.entries(categoryCounts).map(([cat, count]) => `
                            <div class="chart-bar">
                                <div class="bar-label">${cat}</div>
                                <div class="bar-container">
                                    <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                                </div>
                                <div class="bar-count">${count}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="quick-actions">
                    <div class="action-card card" onclick="openAddModal()">
                        <div class="action-icon">➕</div>
                        <div class="action-title">Add Product</div>
                    </div>
                    <div class="action-card card" onclick="syncAll()">
                        <div class="action-icon">🔄</div>
                        <div class="action-title">Sync All to Store</div>
                    </div>
                    <div class="action-card card" onclick="exportCatalog()">
                        <div class="action-icon">📤</div>
                        <div class="action-title">Export Catalog</div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = content;
        }

        // Render products
        function renderProducts() {
            const filtered = products.filter(p => {
                const matchesSearch = !searchQuery || 
                    p.name.toLowerCase().includes(searchQuery) ||
                    p.sku.toLowerCase().includes(searchQuery) ||
                    p.description?.toLowerCase().includes(searchQuery) ||
                    p.category.toLowerCase().includes(searchQuery) ||
                    Object.values(p.attributes || {}).some(v => v.toLowerCase().includes(searchQuery));
                const matchesCategory = !categoryFilter || p.category === categoryFilter;
                const matchesStatus = !statusFilter || p.status === statusFilter;
                return matchesSearch && matchesCategory && matchesStatus;
            });

            if (sortColumn) {
                filtered.sort((a, b) => {
                    let aVal = a[sortColumn];
                    let bVal = b[sortColumn];
                    if (sortColumn === 'completeness') {
                        aVal = calculateCompleteness(a);
                        bVal = calculateCompleteness(b);
                    }
                    if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                    if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            const categories = [...new Set(products.map(p => p.category))];
            const statuses = ['Active', 'Draft', 'Inactive'];

            const headerActions = `
                <input type="text" class="input" placeholder="Search products..." id="searchInput" value="${searchQuery}" style="width: 200px;">
                <select class="select" id="categoryFilter">
                    <option value="">All Categories</option>
                    ${categories.map(cat => `<option value="${cat}" ${categoryFilter === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                </select>
                <select class="select" id="statusFilter">
                    <option value="">All Statuses</option>
                    ${statuses.map(status => `<option value="${status}" ${statusFilter === status ? 'selected' : ''}>${status}</option>`).join('')}
                </select>
                <button class="btn btn-primary" onclick="openAddModal()">Add Product</button>
            `;
            document.getElementById('headerActions').innerHTML = headerActions;

            const content = `
                <div class="stats-strip">
                    <div>Showing ${filtered.length} of ${products.length} products</div>
                </div>
                <div class="filters">
                    <input type="checkbox" class="checkbox" id="selectAll" ${selectedProducts.size === filtered.length && filtered.length > 0 ? 'checked' : ''}>
                    <label for="selectAll">Select All</label>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th></th>
                            <th onclick="sortBy('sku')">SKU <span class="sort-arrow ${sortColumn === 'sku' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('name')">Name <span class="sort-arrow ${sortColumn === 'name' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('category')">Category <span class="sort-arrow ${sortColumn === 'category' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('price')">Price <span class="sort-arrow ${sortColumn === 'price' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('stock')">Stock <span class="sort-arrow ${sortColumn === 'stock' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('status')">Status <span class="sort-arrow ${sortColumn === 'status' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th onclick="sortBy('completeness')">Completeness <span class="sort-arrow ${sortColumn === 'completeness' ? 'sort-' + sortDirection : ''}">▲</span></th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(p => {
                            const completeness = calculateCompleteness(p);
                            const progressClass = completeness < 50 ? 'progress-red' : completeness < 80 ? 'progress-amber' : 'progress-green';
                            return `
                                <tr>
                                    <td><input type="checkbox" class="checkbox" data-id="${p.id}" ${selectedProducts.has(p.id) ? 'checked' : ''}></td>
                                    <td>${p.sku}</td>
                                    <td>${p.name}</td>
                                    <td>${p.category}</td>
                                    <td>$${p.price?.toFixed(2) || 'N/A'}</td>
                                    <td>${p.stock || 0}</td>
                                    <td><span class="badge badge-${p.status === 'Active' ? 'green' : p.status === 'Draft' ? 'amber' : 'gray'}">${p.status}</span></td>
                                    <td>
                                        <div class="progress-bar">
                                            <div class="progress-fill ${progressClass}" style="width: ${completeness}%"></div>
                                        </div>
                                        ${completeness}%
                                    </td>
                                    <td>
                                        <button class="btn btn-ghost" onclick="openEditModal(${p.id})">Edit</button>
                                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('content').innerHTML = content;
            updateBulkActions();
        }

        // Render store
        function renderStore() {
            const activeProducts = products.filter(p => p.status === 'Active' && p.stock > 0);

            const headerActions = `<span class="badge badge-green">LIVE</span>`;
            document.getElementById('headerActions').innerHTML = headerActions;

            const content = `
                <div class="card">
                    <h3>Live Store Preview</h3>
                    <p>Showing ${activeProducts.length} of ${products.length} products. Only Active + In Stock appear.</p>
                </div>
                <div class="grid">
                    ${activeProducts.map(p => {
                        const completeness = calculateCompleteness(p);
                        const progressClass = completeness < 50 ? 'progress-red' : completeness < 80 ? 'progress-amber' : 'progress-green';
                        const attrs = Object.entries(p.attributes || {}).slice(0, 2);
                        return `
                            <div class="product-card card">
                                <div class="product-emoji">${getCategoryEmoji(p.category)}</div>
                                <div class="product-category">${p.category}</div>
                                <div class="product-name">${p.name}</div>
                                <div class="product-price">$${p.price.toFixed(2)}</div>
                                <div class="product-stock">${getStockBadge(p.stock)}</div>
                                <div class="product-attrs">
                                    ${attrs.map(([k, v]) => `<span class="attr-chip">${k}: ${v}</span>`).join('')}
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${progressClass}" style="width: ${completeness}%"></div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            document.getElementById('content').innerHTML = content;
        }

        // Render sync log
        function renderSyncLog() {
            const headerActions = `<button class="btn btn-danger" onclick="clearSyncLog()">Clear Log</button>`;
            document.getElementById('headerActions').innerHTML = headerActions;

            const content = `
                <div class="sync-log">
                    ${syncLog.length ? syncLog.map(entry => `
                        <div class="log-entry">
                            <div class="log-time">${entry.time}</div>
                            <div class="log-type"><span class="badge badge-${entry.type.toLowerCase() === 'created' ? 'green' : entry.type.toLowerCase() === 'updated' ? 'blue' : entry.type.toLowerCase() === 'deleted' ? 'red' : entry.type.toLowerCase() === 'synced' ? 'purple' : entry.type.toLowerCase() === 'skipped' ? 'amber' : 'gray'}">${entry.type}</span></div>
                            <div class="log-message">${entry.message}</div>
                        </div>
                    `).join('') : '<div class="log-entry">No sync events yet</div>'}
                </div>
            `;
            document.getElementById('content').innerHTML = content;
        }

        // Render attributes
        function renderAttributes() {
            const attrMap = {};
            products.forEach(p => {
                Object.entries(p.attributes || {}).forEach(([k, v]) => {
                    if (!attrMap[k]) attrMap[k] = { values: new Set(), count: 0 };
                    attrMap[k].values.add(v);
                    attrMap[k].count++;
                });
            });

            const maxCount = Math.max(...Object.values(attrMap).map(a => a.count));

            const content = `
                ${Object.entries(attrMap).map(([name, data]) => `
                    <div class="attr-card card">
                        <div class="attr-name">${name}</div>
                        <div class="attr-values">
                            ${Array.from(data.values).map(v => `<span class="badge badge-green">${v}</span>`).join('')}
                        </div>
                        <div class="attr-count">${data.count} products</div>
                        <div class="usage-bar">
                            <div class="usage-fill" style="width: ${(data.count / maxCount) * 100}%"></div>
                        </div>
                    </div>
                `).join('')}
            `;
            document.getElementById('content').innerHTML = content;
        }

        // Render import/export
        function renderImportExport() {
            const sample = products.slice(0, 2);
            const jsonPreview = JSON.stringify(sample, null, 2);

            const content = `
                <div class="import-export">
                    <div class="card">
                        <h3>Export</h3>
                        <button class="btn btn-primary" onclick="exportJSON()">Export as JSON</button>
                        <button class="btn btn-primary" onclick="exportCSV()">Export as CSV</button>
                        <div class="export-preview">${jsonPreview}</div>
                    </div>
                    <div class="card">
                        <h3>Import</h3>
                        <div class="drop-zone" id="dropZone">
                            Drop JSON or CSV here<br>
                            <small>or click to select file</small>
                        </div>
                        <input type="file" id="fileInput" accept=".json,.csv" style="display: none;">
                        <p>Format: JSON array of products or CSV with headers: sku,name,description,price,stock,category,status,attributes (JSON string)</p>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = content;

            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            });
            fileInput.addEventListener('change', e => {
                const file = e.target.files[0];
                if (file) handleFile(file);
            });
        }

        // Handle file import
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    if (file.name.endsWith('.json')) {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            products.push(...imported);
                            saveData();
                            showToast(`Imported ${imported.length} products`, 'success');
                            addToSyncLog('INFO', `Imported ${imported.length} products from JSON`);
                            renderProducts();
                        } else {
                            showToast('Invalid JSON format', 'error');
                        }
                    } else if (file.name.endsWith('.csv')) {
                        const csv = e.target.result;
                        const lines = csv.split('\n');
                        const headers = lines[0].split(',');
                        const imported = [];
                        for (let i = 1; i < lines.length; i++) {
                            if (!lines[i].trim()) continue;
                            const values = lines[i].split(',');
                            const product = {};
                            headers.forEach((h, idx) => {
                                if (h === 'attributes') {
                                    try {
                                        product[h] = JSON.parse(values[idx]);
                                    } catch {
                                        product[h] = {};
                                    }
                                } else if (h === 'price' || h === 'stock') {
                                    product[h] = parseFloat(values[idx]);
                                } else {
                                    product[h] = values[idx];
                                }
                            });
                            imported.push(product);
                        }
                        products.push(...imported);
                        saveData();
                        showToast(`Imported ${imported.length} products`, 'success');
                        addToSyncLog('INFO', `Imported ${imported.length} products from CSV`);
                        renderProducts();
                    }
                } catch (err) {
                    showToast('Error parsing file', 'error');
                }
            };
            reader.readAsText(file);
        }

        // Export JSON
        function exportJSON() {
            const data = JSON.stringify(products, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported as JSON', 'success');
        }

        // Export CSV
        function exportCSV() {
            const headers = ['sku', 'name', 'description', 'price', 'stock', 'category', 'status', 'attributes'];
            const csv = [headers.join(',')];
            products.forEach(p => {
                const row = [
                    p.sku,
                    `"${p.name}"`,
                    `"${p.description || ''}"`,
                    p.price,
                    p.stock,
                    p.category,
                    p.status,
                    `"${JSON.stringify(p.attributes || {})}"`
                ];
                csv.push(row.join(','));
            });
            const data = csv.join('\n');
            const blob = new Blob([data], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.csv';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported as CSV', 'success');
        }

        // Open add modal
        function openAddModal() {
            openProductModal();
        }

        // Open edit modal
        function openEditModal(id) {
            const product = products.find(p => p.id === id);
            openProductModal(product);
        }

        // Open product modal
        function openProductModal(product = null) {
            const isEdit = !!product;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <div class="modal-title">${isEdit ? 'Edit' : 'Add'} Product</div>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    <form id="productForm">
                        <div class="form-group">
                            <label class="form-label">SKU</label>
                            <input type="text" class="input" id="sku" value="${product?.sku || generateSKU('')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="input" id="name" value="${product?.name || ''}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="input textarea" id="description">${product?.description || ''}</textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Price</label>
                                <input type="number" step="0.01" class="input" id="price" value="${product?.price || ''}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Stock</label>
                                <input type="number" class="input" id="stock" value="${product?.stock || ''}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="select" id="category" onchange="updateSKU()">
                                <option value="">Select Category</option>
                                <option value="Audio" ${product?.category === 'Audio' ? 'selected' : ''}>Audio</option>
                                <option value="Accessories" ${product?.category === 'Accessories' ? 'selected' : ''}>Accessories</option>
                                <option value="Keyboards" ${product?.category === 'Keyboards' ? 'selected' : ''}>Keyboards</option>
                                <option value="Cameras" ${product?.category === 'Cameras' ? 'selected' : ''}>Cameras</option>
                                <option value="Monitors" ${product?.category === 'Monitors' ? 'selected' : ''}>Monitors</option>
                                <option value="Laptops" ${product?.category === 'Laptops' ? 'selected' : ''}>Laptops</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <div class="status-pills">
                                <div class="status-pill ${product?.status === 'Active' ? 'active' : ''}" data-status="Active">Active</div>
                                <div class="status-pill ${product?.status === 'Draft' ? 'active' : ''}" data-status="Draft">Draft</div>
                                <div class="status-pill ${product?.status === 'Inactive' ? 'active' : ''}" data-status="Inactive">Inactive</div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Image URL (optional)</label>
                            <input type="url" class="input" id="imageUrl" value="${product?.imageUrl || ''}">
                            <div id="imagePreview"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Attributes</label>
                            <div class="attributes-list" id="attributesList">
                                ${Object.entries(product?.attributes || {}).map(([k, v]) => `
                                    <div class="attribute-item">
                                        <input type="text" class="input attribute-input" placeholder="Name" value="${k}">
                                        <input type="text" class="input attribute-input" placeholder="Value" value="${v}">
                                        <button type="button" class="attribute-remove">&times;</button>
                                    </div>
                                `).join('')}
                            </div>
                            <button type="button" class="btn btn-ghost" onclick="addAttribute()">+ Add attribute</button>
                            <button type="button" class="btn btn-purple" onclick="aiSuggest()">AI Suggest</button>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Update' : 'Create'} Product</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Event listeners
            modal.querySelector('#productForm').addEventListener('submit', e => {
                e.preventDefault();
                saveProduct(isEdit, product?.id);
            });
            modal.querySelectorAll('.status-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    modal.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                });
            });
            modal.querySelector('#imageUrl').addEventListener('input', updateImagePreview);
            modal.querySelector('#name').addEventListener('input', () => {
                const aiDiv = modal.querySelector('.ai-suggest');
                if (aiDiv) aiDiv.remove();
            });
            updateImagePreview();
        }

        // Update SKU
        function updateSKU() {
            const category = document.getElementById('category').value;
            if (category) {
                document.getElementById('sku').value = generateSKU(category);
            }
        }

        // Update image preview
        function updateImagePreview() {
            const url = document.getElementById('imageUrl').value;
            const preview = document.getElementById('imagePreview');
            if (url) {
                preview.innerHTML = `<img src="${url}" style="max-width: 100px; max-height: 100px; margin-top: 8px;">`;
            } else {
                preview.innerHTML = '';
            }
        }

        // Add attribute
        function addAttribute() {
            const list = document.getElementById('attributesList');
            const item = document.createElement('div');
            item.className = 'attribute-item';
            item.innerHTML = `
                <input type="text" class="input attribute-input" placeholder="Name">
                <input type="text" class="input attribute-input" placeholder="Value">
                <button type="button" class="attribute-remove">&times;</button>
            `;
            item.querySelector('.attribute-remove').addEventListener('click', () => item.remove());
            list.appendChild(item);
        }

        // AI suggest
        function aiSuggest() {
            const name = document.getElementById('name').value;
            if (!name) return;
            const suggestions = getAISuggestions(name);
            const desc = generateAIDescription(name, {});
            const aiDiv = document.querySelector('.ai-suggest');
            if (aiDiv) aiDiv.remove();
            const form = document.getElementById('productForm');
            const suggestDiv = document.createElement('div');
            suggestDiv.className = 'ai-suggest';
            suggestDiv.innerHTML = `
                <div class="ai-label">AI generated</div>
                <div class="ai-chips">
                    ${suggestions.map(s => `<div class="ai-chip" onclick="addSuggestedAttribute('${s}')">${s}</div>`).join('')}
                </div>
                <div class="ai-preview">${desc}</div>
            `;
            form.insertBefore(suggestDiv, form.lastElementChild);
            document.getElementById('description').value = desc;
        }

        // Add suggested attribute
        function addSuggestedAttribute(name) {
            const list = document.getElementById('attributesList');
            const item = document.createElement('div');
            item.className = 'attribute-item';
            item.innerHTML = `
                <input type="text" class="input attribute-input" placeholder="Name" value="${name}">
                <input type="text" class="input attribute-input" placeholder="Value">
                <button type="button" class="attribute-remove">&times;</button>
            `;
            item.querySelector('.attribute-remove').addEventListener('click', () => item.remove());
            list.appendChild(item);
        }

        // Save product
        function saveProduct(isEdit, id) {
            const sku = document.getElementById('sku').value.trim();
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            const price = parseFloat(document.getElementById('price').value);
            const stock = parseInt(document.getElementById('stock').value);
            const category = document.getElementById('category').value;
            const status = document.querySelector('.status-pill.active')?.dataset.status || 'Draft';
            const imageUrl = document.getElementById('imageUrl').value.trim();

            if (!name || !sku) {
                showToast('Name and SKU are required', 'error');
                return;
            }

            const attributes = {};
            document.querySelectorAll('.attribute-item').forEach(item => {
                const inputs = item.querySelectorAll('.attribute-input');
                const key = inputs[0].value.trim();
                const value = inputs[1].value.trim();
                if (key && value) attributes[key] = value;
            });

            const product = {
                id: isEdit ? id : nextId++,
                sku,
                name,
                description,
                price,
                stock,
                category,
                status,
                imageUrl,
                attributes,
                createdAt: isEdit ? products.find(p => p.id === id).createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            if (isEdit) {
                const index = products.findIndex(p => p.id === id);
                products[index] = product;
                addToSyncLog('UPDATED', `Updated product ${sku}`);
                showToast('Product updated', 'success');
            } else {
                products.push(product);
                addToSyncLog('CREATED', `Created product ${sku}`);
                showToast('Product created', 'success');
            }

            saveData();
            closeModal();
            if (currentPage === 'products') renderProducts();
        }

        // Delete product
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                const product = products.find(p => p.id === id);
                products = products.filter(p => p.id !== id);
                addToSyncLog('DELETED', `Deleted product ${product.sku}`);
                showToast('Product deleted', 'success');
                saveData();
                renderProducts();
            }
        }

        // Close modal
        function closeModal() {
            const modal = document.querySelector('.modal-overlay');
            if (modal) modal.remove();
        }

        // Open side panel
        function openSidePanel(id) {
            const product = products.find(p => p.id === id);
            const completeness = calculateCompleteness(product);
            const progressClass = completeness < 50 ? 'progress-red' : completeness < 80 ? 'progress-amber' : 'progress-green';

            const panel = document.getElementById('sidePanel');
            panel.innerHTML = `
                <div class="card">
                    <h3>${product.name}</h3>
                    <p><strong>SKU:</strong> ${product.sku}</p>
                    <p><strong>Category:</strong> ${product.category}</p>
                    <p><strong>Price:</strong> $${product.price?.toFixed(2) || 'N/A'}</p>
                    <p><strong>Stock:</strong> ${product.stock || 0}</p>
                    <p><strong>Status:</strong> <span class="badge badge-${product.status === 'Active' ? 'green' : product.status === 'Draft' ? 'amber' : 'gray'}">${product.status}</span></p>
                    <p><strong>Description:</strong> ${product.description || 'N/A'}</p>
                    <p><strong>Last Modified:</strong> ${new Date(product.updatedAt).toLocaleString()}</p>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${completeness}%"></div>
                    </div>
                    <p>Completeness: ${completeness}%</p>
                    <h4>Attributes</h4>
                    ${Object.entries(product.attributes || {}).map(([k, v]) => `<p><strong>${k}:</strong> ${v}</p>`).join('')}
                    <button class="btn btn-primary" onclick="openEditModal(${product.id}); closeSidePanel()">Edit</button>
                </div>
            `;
            panel.classList.add('open');
            document.getElementById('sideOverlay').classList.add('show');
        }

        // Close side panel
        function closeSidePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            document.getElementById('sideOverlay').classList.remove('show');
        }

        // Update bulk actions
        function updateBulkActions() {
            const bulk = document.getElementById('bulkActions');
            const selected = document.getElementById('bulkSelected');
            if (selectedProducts.size > 0) {
                selected.textContent = `${selectedProducts.size} selected`;
                bulk.classList.add('show');
            } else {
                bulk.classList.remove('show');
            }
        }

        // Bulk delete
        function bulkDelete() {
            if (confirm(`Delete ${selectedProducts.size} products?`)) {
                const toDelete = Array.from(selectedProducts);
                products = products.filter(p => !selectedProducts.has(p.id));
                selectedProducts.clear();
                addToSyncLog('DELETED', `Bulk deleted ${toDelete.length} products`);
                showToast(`${toDelete.length} products deleted`, 'success');
                saveData();
                renderProducts();
            }
        }

        // Bulk status
        function bulkStatus(status) {
            products.forEach(p => {
                if (selectedProducts.has(p.id)) {
                    p.status = status;
                    p.updatedAt = new Date().toISOString();
                }
            });
            selectedProducts.clear();
            addToSyncLog('UPDATED', `Bulk updated status to ${status}`);
            showToast(`Status updated to ${status}`, 'success');
            saveData();
            renderProducts();
        }

        // Bulk sync
        function bulkSync() {
            const synced = Array.from(selectedProducts);
            synced.forEach(id => {
                const product = products.find(p => p.id === id);
                addToSyncLog('SYNCED', `Synced ${product.sku} to store`);
            });
            selectedProducts.clear();
            showToast(`${synced.length} products synced`, 'success');
            renderProducts();
        }

        // Deselect all
        function deselectAll() {
            selectedProducts.clear();
            renderProducts();
        }

        // Sync all
        function syncAll() {
            const toSync = products.filter(p => p.status === 'Active' && p.stock > 0);
            toSync.forEach(p => addToSyncLog('SYNCED', `Synced ${p.sku} to store`));
            showToast(`${toSync.length} products synced`, 'success');
        }

        // Export catalog
        function exportCatalog() {
            exportJSON();
        }

        // Clear sync log
        function clearSyncLog() {
            syncLog.length = 0;
            saveData();
            renderSyncLog();
        }

        // Sort by column
        function sortBy(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderProducts();
        }

        // Navigate
        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === page);
            });
            document.getElementById('pageTitle').textContent = page.charAt(0).toUpperCase() + page.slice(1).replace('-', ' ');
            document.getElementById('headerActions').innerHTML = '';
            if (page === 'dashboard') renderDashboard();
            else if (page === 'products') renderProducts();
            else if (page === 'store') renderStore();
            else if (page === 'sync') renderSyncLog();
            else if (page === 'attributes') renderAttributes();
            else if (page === 'import-export') renderImportExport();
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            navigate('dashboard');

            document.querySelector('.sidebar').addEventListener('click', e => {
                if (e.target.classList.contains('nav-link')) {
                    navigate(e.target.dataset.page);
                }
            });

            document.addEventListener('click', e => {
                if (e.target.matches('.table tr td:not(:first-child)')) {
                    const row = e.target.closest('tr');
                    const checkbox = row.querySelector('input[type="checkbox"]');
                    const id = parseInt(checkbox.dataset.id);
                    openSidePanel(id);
                }
                if (e.target.matches('#sideOverlay')) {
                    closeSidePanel();
                }
                if (e.target.matches('#selectAll')) {
                    const filtered = products.filter(p => {
                        const matchesSearch = !searchQuery || 
                            p.name.toLowerCase().includes(searchQuery) ||
                            p.sku.toLowerCase().includes(searchQuery) ||
                            p.description?.toLowerCase().includes(searchQuery) ||
                            p.category.toLowerCase().includes(searchQuery) ||
                            Object.values(p.attributes || {}).some(v => v.toLowerCase().includes(searchQuery));
                        const matchesCategory = !categoryFilter || p.category === categoryFilter;
                        const matchesStatus = !statusFilter || p.status === statusFilter;
                        return matchesSearch && matchesCategory && matchesStatus;
                    });
                    if (e.target.checked) {
                        filtered.forEach(p => selectedProducts.add(p.id));
                    } else {
                        filtered.forEach(p => selectedProducts.delete(p.id));
                    }
                    renderProducts();
                }
                if (e.target.matches('input[type="checkbox"][data-id]')) {
                    const id = parseInt(e.target.dataset.id);
                    if (e.target.checked) {
                        selectedProducts.add(id);
                    } else {
                        selectedProducts.delete(id);
                    }
                    updateBulkActions();
                }
                if (e.target.matches('#bulkDelete')) bulkDelete();
                if (e.target.matches('#bulkStatusActive')) bulkStatus('Active');
                if (e.target.matches('#bulkStatusDraft')) bulkStatus('Draft');
                if (e.target.matches('#bulkStatusInactive')) bulkStatus('Inactive');
                if (e.target.matches('#bulkSync')) bulkSync();
                if (e.target.matches('#deselectAll')) deselectAll();
            });

            document.addEventListener('input', e => {
                if (e.target.matches('#searchInput')) {
                    searchQuery = e.target.value.toLowerCase();
                    renderProducts();
                }
                if (e.target.matches('#categoryFilter')) {
                    categoryFilter = e.target.value;
                    renderProducts();
                }
                if (e.target.matches('#statusFilter')) {
                    statusFilter = e.target.value;
                    renderProducts();
                }
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    closeModal();
                    closeSidePanel();
                }
                if (e.key === 'n' && !e.target.matches('input, textarea')) {
                    e.preventDefault();
                    openAddModal();
                }
                if (e.key === '/' && !e.target.matches('input, textarea')) {
                    e.preventDefault();
                    document.getElementById('searchInput')?.focus();
                }
            });
        });
    </script>
</body>
</html>
